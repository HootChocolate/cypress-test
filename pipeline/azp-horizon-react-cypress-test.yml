                                "type": "FactSet",
                                "facts": [
                                  { "title": "🧪 Framework:", "value": "Cypress $cypressVersion" },
                                  { "title": "🖥️ Navegador", "value": "$browserName - $browserVersion" },
                                  { "title": "🌐 Servidor:", "value": "$baseUrl" },
                                  { "title": "📡 API:", "value": "$base_url_api" },
                                  { "title": "🔁 Pipeline:", "value": "$(PIPELINE_TEST)" },
                                  { "title": "📊 Testes Executados:", "value": "$totalSuites Suites - $totalTests Testes" },
                                  { "title": "🟢 Testes com sucesso:", "value": "$totalPassed" },
                                  { "title": "🔴 Testes com erro:", "value": "$totalFailed" },
                                  { "title": "📅 Executado em:", "value": "$endedTestsAt" },
                                  { "title": "🕒 Tempo de Execução:", "value": "$totalDuration" }
                                ]
                              }
                            ],
                            "actions": [
                              {
                                "type": "Action.OpenUrl",
                                "title": "📈 Results Dashboard",
                                "url": "$(DASHBOARD_TESTS_RESULT)"
                              }
                            ]
                          }
                        }
                      ]
                    }')

                  # separa body e status code
                  body=$(echo "$response" | sed '$d')
                  status_code=$(echo "$response" | tail -n1)

                  echo "Status Code: $status_code"

                  # validação
                  if [ "$status_code" -ne 202 ]; then
                    echo "❌ Erro ao enviar mensagem para o Teams"
                    echo "Response body:"
                    echo "$body"
                    exit 1
                  else
                    echo "✅ Mensagem enviada com sucesso"
                  fi
